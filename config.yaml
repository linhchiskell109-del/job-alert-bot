# =========================================================================
# CONFIG cho Job Alert Bot — v2.1
# =========================================================================
# Mỗi công ty CHỈ CẦN "name" + "url" (link career/tuyển dụng đã được verify thủ
# công — xem "companies" bên dưới). Bot tự động:
#   - Kiểm tra URL còn truy cập được không (không tự đoán URL khác nếu chết)
#   - Phát hiện ATS: Workday / Greenhouse / Lever / SmartRecruiters (có adapter
#     public API) hoặc SAP SuccessFactors / Oracle Recruiting (chỉ nhận diện để
#     route đúng, không có API public tin cậy nên dùng HTML/Playwright)
#   - Nếu không phải ATS đã biết -> tự parse HTML tìm job (heuristic, không cần
#     CSS selector)
#   - Nếu HTML tĩnh không đủ (trang cần JS) -> tự fallback sang trình duyệt thật
#
# Escape hatch (KHÔNG bắt buộc): nếu bạn đã biết chắc 1 công ty dùng ATS nào đó,
# có thể khai báo thẳng để bỏ qua bước auto-detect, ví dụ:
#   - name: "Some Company"
#     url: "https://somecompany.com/careers"
#     ats_hint: "greenhouse"
#     ats_params: { board_token: "somecompany" }
# =========================================================================

companies:
  # ---------------- Vietnam tech / fintech ----------------
  - name: "MoMo (M_Service)"
    url: "https://momo.careers/jobs-opening"

  - name: "Grab"
    url: "https://grab.careers"

