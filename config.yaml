# =========================================================================
# LOCATION — dùng ở 2 nơi:
#   1. EARLY FILTER (bắt buộc, trong pipeline.py, chạy NGAY SAU Normalize +
#      Validate, TRƯỚC KHI vào matching engine) — loại thẳng job có location
#      RÕ RÀNG không thuộc danh sách này (vd "Singapore", "London", "Boston").
#      Job có location "Unknown"/trống KHÔNG bị loại ở bước này (không đủ căn
#      cứ để nói "rõ ràng ở nước khác") — để matching engine tự cân nhắc.
#   2. Soft scoring bên trong matching engine (location_match trong
#      scoring.yaml) khi matching_engine=legacy hoặc muốn chấm điểm thêm.
# Để trống (locations: []) nếu không muốn lọc theo location ở cả 2 nơi.
# =========================================================================
locations:
  - "vn"
  - "vietnam"
  - "viet nam"
  - "remote vietnam"
  - "hybrid vietnam"
  - "hn"
  - "ha noi"
  - "hanoi"
  - "hcmc"
  - "hcm"
  - "ho chi minh"
  - "saigon"
  - "sai gon"
  - "sea"

# match_mode: chỉ dùng khi matching_engine = "legacy" bên dưới.
#             "AND" -> job phải khớp keyword AND level AND location
#             "keyword_only" -> chỉ cần khớp keyword (bỏ qua level/location)
match_mode: "AND"

# =========================================================================
# MATCHING ENGINE — chọn cách chấm job MỚI, dữ liệu ngành/function/level/điểm
# nằm 100% trong config/taxonomy.yaml + config/scoring.yaml +
# config/company_industry_overrides.yaml (KHÔNG hard-code trong code Python).
#   "semantic" (mặc định, khuyến nghị) -> semantic career matching engine:
#       nhận diện ngành công ty -> chuẩn hoá function (Product/Growth/Marketing/
#       Trade Marketing/...) -> chuẩn hoá level (entry/mid/senior) -> tính
#       compatibility score có trọng số -> log giải thích cho từng job (accept
#       lẫn reject) + báo cáo tổng kết cuối lần chạy.
#   "legacy" -> filters.job_matches cũ (jd_keywords/levels/locations PASS-FAIL
#       phía trên) — giữ lại để rollback nhanh nếu semantic engine cần tinh
#       chỉnh thêm, KHÔNG cần sửa code để chuyển qua lại.
# `locations` phía trên vẫn được semantic engine dùng làm bộ lọc địa điểm.
# =========================================================================
matching_engine: "semantic"

# =========================================================================
# DEBUG MODE — coi MỌI job scrape được là "mới" (bỏ qua state.json hoàn toàn,
# không đọc lẫn không ghi), nhưng vẫn chạy đầy đủ semantic matching + scoring.
# Dùng để test/tune taxonomy.yaml/scoring.yaml mà không sợ "đốt" state thật
# (lần chạy debug xong, state.json KHÔNG bị thay đổi gì).
#
# Có thể bật nhanh qua biến môi trường mà không cần sửa file này:
#   DEBUG_IGNORE_DUPLICATES=true python src/main.py
# (env var ưu tiên hơn giá trị bên dưới nếu có set)
# =========================================================================
debug_ignore_duplicates: false
