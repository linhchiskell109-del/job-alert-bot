  - name: "Boston Consulting Group (BCG)"
    url: "https://careers.bcg.com"

  - name: "Roland Berger"
    url: "https://www.rolandberger.com/en/Careers"

  - name: "KPMG Vietnam"
    url: "https://kpmg.com/vn/en/home/careers.html"

  - name: "EY-Parthenon"
    url: "https://careers.ey.com"

