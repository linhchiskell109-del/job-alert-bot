# =========================================================================
# CONFIG cho Job Alert Bot — v2 (auto-detect, không cần khai báo ATS/selector)
# =========================================================================
# Mỗi công ty CHỈ CẦN "name" + "url" (link tới trang career/tuyển dụng).
# Bot sẽ tự động:
#   - Phát hiện công ty có dùng Workday/Greenhouse/Lever không (qua ats_detector.py)
#   - Nếu không, tự parse HTML để tìm job (heuristic, không cần CSS selector)
#   - Nếu HTML tĩnh không đủ (trang cần JS) -> tự fallback sang trình duyệt thật
#
# TODO: một vài URL dưới đây là best-effort tại thời điểm viết config, có thể đã
# đổi domain/path. Nếu log báo "[NONE] <company>: 0 job(s)" liên tục, việc đầu
# tiên cần làm là mở URL đó bằng trình duyệt và kiểm tra link có còn đúng không
# (KHÔNG cần inspect CSS selector — chỉ cần đúng URL).
#
# Escape hatch (KHÔNG bắt buộc): nếu bạn đã biết chắc 1 công ty dùng ATS nào đó,
# có thể khai báo thẳng để bỏ qua bước auto-detect, ví dụ:
#   - name: "Some Company"
#     url: "https://somecompany.com/careers"
#     ats_hint: "greenhouse"
#     ats_params: { board_token: "somecompany" }
# =========================================================================

companies:
