    - "hồ chí minh"
    - "ho chi minh"
    - "tp hồ chí minh"
    - "tp. hồ chí minh"
    - "hcmc"
    - "hcm"
  "Hanoi":
    - "hà nội"
    - "ha noi"
    - "hn"
  "Da Nang":
    - "đà nẵng"
    - "da nang"
  "Can Tho":
    - "cần thơ"
    - "can tho"
  "Hai Phong":
    - "hải phòng"
    - "hai phong"
  "Singapore":
    - "singapore"
  "Bangkok":
    - "bangkok"
  "Kuala Lumpur":
