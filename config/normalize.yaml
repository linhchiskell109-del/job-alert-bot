    - "ho chi minh"
    - "tp hồ chí minh"
    - "tp. hồ chí minh"
    - "hcmc"
    - "hcm"
  "Hanoi":
    - "hà nội"
    - "ha noi"
    - "hn"
  "Da Nang":
