# =============================================================================
# TAXONOMY — nguồn dữ liệu DUY NHẤT cho matching engine (src/matching/engine.py).
# =============================================================================
# Toàn bộ khái niệm "ngành nào", "function nào tương đương title nào", "level nào
# tương đương title nào" đều khai báo ở ĐÂY, KHÔNG hard-code trong Python.
# Muốn thêm 1 ngành mới / 1 function mới / 1 cách gọi title mới -> sửa file này,
# không cần đụng code.
#
# Cấu trúc:
#   industries.<industry_id>
#     display_name        : tên hiển thị trong log
#     keywords             : từ khoá xuất hiện trong title/JD giúp NHẬN DIỆN ngành
#                             (dùng khi công ty không có trong company_overrides.yaml)
#     relevant_functions   : danh sách function_id được coi là "đúng ngành" cho
#                             industry này (dùng để tính industry_alignment)
#
#   functions.<function_id>
#     display_name
#     synonyms              : mọi cách gọi title/JD được coi là thuộc function này,
#                              trên MỌI công ty/ngành (không phân biệt hoa thường,
#                              không dấu — xem src/textnorm.py)
#     excluded               : true -> function này KHÔNG BAO GIỜ được chấp nhận dù
#                              ở ngành nào (vd Engineering, Legal, HR thuần) — job
#                              khớp function này bị loại ngay ở bước "keyword"
#
#   levels.<level_id>
#     display_name
#     synonyms
#     weight                 : 0.0 - 1.0, dùng trong scoring.yaml (level_match)
#     eligible                : true -> level này được coi là "phù hợp" (entry-level
#                              target); false -> vẫn nhận diện được nhưng bị điểm thấp
#                              (vd senior/manager trở lên)
# =============================================================================

