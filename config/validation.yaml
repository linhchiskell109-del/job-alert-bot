# =============================================================================
# VALIDATION — quy tắc xác định 1 job "thô" (đã normalize) có phải là 1 JOB
# POSTING THẬT hay chỉ là trang điều hướng/menu (nav page) bị lọt vào do scraper
# quá lỏng lẻo. Dữ liệu 100% ở đây — src/validation.py chỉ chứa thuật toán áp
# dụng chung, không hard-code từ khoá nào.
# =============================================================================

# Job phải có ĐỦ các field này (sau khi trim) mới được coi là hợp lệ.
# "location_or_country" nghĩa là chỉ cần 1 trong 2 field "location"/"country"
# có giá trị, không cần cả 2.
required_fields:
  - title
  - url
required_any_of:
  - [location, country]

min_title_length: 4
max_title_length: 140

# =============================================================================
# BLOCKLIST — nếu TOÀN BỘ title (sau chuẩn hoá) TRÙNG hoặc gần như trùng 1 cụm
# trong danh sách này, hoặc title CHỈ chứa các từ điều hướng này mà không có
# nội dung job nào khác, job bị loại. Đây là literal nav/menu text các site
# careers hay dùng (nút "Explore", "Apply Now", breadcrumb "Careers", v.v.),
# KHÔNG phải tên chức danh — job title thật gần như không bao giờ trùng khớp
# các cụm này.
# =============================================================================
